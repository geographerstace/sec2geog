<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sec 2 Geography Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        h1 { margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p { margin-bottom: 40px; opacity: 0.9; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card h2 { margin: 10px 0; color: #2a5298; }
        .card .icon { font-size: 40px; }
        .card .topic { 
            font-size: 0.8em; 
            background: #eee; 
            padding: 4px 10px; 
            border-radius: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>🌍 Sec 2 Geography Interactives</h1>
    <p>Select a simulation or game to begin your learning journey.</p>

    <div class="menu-grid">
        <a href="tug-of-war/" class="card">
            <div class="icon">🏗️</div>
            <div class="topic">Housing</div>
            <h2>HDB Tug-of-War</h2>
            <p>Balance Inclusivity and Environmental sustainability.</p>
        </a>

        <a href="#" class="card" style="opacity: 0.7; cursor: not-allowed;">
            <div class="icon">🌦️</div>
            <div class="topic">Weather</div>
            <h2>Coming Soon</h2>
            <p>Next topic: Tropical Cyclones simulation.</p>
        </a>
    </div>

</body>
</html>
